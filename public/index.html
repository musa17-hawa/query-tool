<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Data Query Tool</title>
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Third-party libraries (loaded from CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">▦</span>
        <span class="brand-name">Data Query Tool</span>
      </div>
      <div class="topbar-actions">
        <label for="file-input" class="btn btn-primary">
          <span>＋ Load file</span>
          <input id="file-input" type="file" multiple
                 accept=".csv,.tsv,.txt,.xlsx,.xls,.xml,.json,.db,.sqlite,.sqlite3" />
        </label>
        <button id="reset-btn" class="btn btn-ghost" title="Clear all loaded data">Reset</button>
      </div>
    </div>
  </header>

  <main class="layout">

    <!-- ========== Left: schema browser ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="panel">
        <div class="panel-head">
          <h2>Tables</h2>
          <span id="table-count" class="badge">0</span>
        </div>
        <div id="table-list" class="table-list">
          <p class="empty-hint">No data loaded yet. Click <strong>Load file</strong> to begin.</p>
        </div>
      </div>

      <div class="panel" id="columns-panel" hidden>
        <div class="panel-head">
          <h2>Columns</h2>
          <span id="column-count" class="badge">0</span>
        </div>
        <div id="column-list" class="column-list"></div>
      </div>
    </aside>

    <!-- ========== Right: querying area ========== -->
    <section class="content">

      <!-- Drop zone shown until first file -->
      <div id="dropzone" class="dropzone">
        <div class="dropzone-inner">
          <div class="dropzone-icon">⤓</div>
          <h3>Drop a file here, or click <em>Load file</em></h3>
          <p>CSV, TSV, XLSX, XLS, XML, JSON, SQLite (.db / .sqlite)</p>
        </div>
      </div>

      <!-- Filter builder (hidden until data loaded) -->
      <div id="query-section" class="query-section" hidden>

        <div class="panel">
          <div class="panel-head">
            <h2>Filter</h2>
            <div class="panel-actions">
              <label class="lbl-inline">
                Table:
                <select id="active-table" class="select"></select>
              </label>
            </div>
          </div>

          <div id="filter-builder" class="filter-builder"></div>

          <div class="filter-toolbar">
            <button id="add-condition" class="btn btn-secondary">+ Add condition</button>
            <button id="add-or" class="btn btn-secondary">+ Add OR clause</button>
            <button id="clear-filter" class="btn btn-ghost">Clear filter</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Generated SQL</h2>
            <div class="panel-actions">
              <button id="toggle-sql-edit" class="btn btn-ghost btn-sm">Edit manually</button>
            </div>
          </div>
          <textarea id="sql-output" class="sql-output" readonly spellcheck="false"></textarea>
          <div class="filter-toolbar">
            <button id="run-query" class="btn btn-primary">▶ Run query</button>
            <span id="result-meta" class="result-meta"></span>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Results</h2>
            <div class="panel-actions">
              <button id="export-csv" class="btn btn-ghost btn-sm" disabled>Export CSV</button>
            </div>
          </div>
          <div id="results" class="results">
            <p class="empty-hint">No query run yet. Build a filter above and hit <strong>Run query</strong>.</p>
          </div>
        </div>
      </div>

    </section>
  </main>

  <!-- Toast container for messages -->
  <div id="toast" class="toast" hidden></div>

  <!-- App scripts: load order matters -->
  <script src="/js/parser.js"></script>
  <script src="/js/database.js"></script>
  <script src="/js/querybuilder.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
